name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Ghostscript
        run: brew install ghostscript

      - name: Validate scripts and package
        run: ./scripts/check.sh

      - name: Inspect release artifact
        run: |
          VERSION=$(cat VERSION)
          tar -tzf "dist/docuprint-m205b-macos-driver-${VERSION}.tar.gz" | sed -n '1,120p'
